<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <header class="header">
      <h1>X Badge Filter</h1>
      <label class="main-toggle">
        <input type="checkbox" id="enabled">
        <span class="toggle-slider"></span>
      </label>
    </header>

    <section class="section" id="settingsSection">
      <h2>表示設定</h2>
      <div class="option-list">
        <label class="option">
          <span class="option-label">非表示バーを表示</span>
          <input type="checkbox" id="showPlaceholder">
        </label>
      </div>

      <h2>ホワイトリスト</h2>
      <div class="whitelist-section">
        <div class="whitelist-input-row">
          <input type="text" id="whitelistInput" placeholder="@handle" spellcheck="false">
          <button id="addWhitelist">追加</button>
        </div>
        <div id="whitelistItems" class="whitelist-items"></div>
        <p class="whitelist-empty" id="whitelistEmpty">ホワイトリストは空です</p>
      </div>
    </section>

    <footer class="footer">
      <span id="statsText">0 件非表示</span>
    </footer>
  </div>

  <script src="../shared/constants.js"></script>
  <script src="popup.js"></script>
</body>
</html>
